name: Container Build and Report CVE

on:
  push:
    branches: ["main"]
    paths:
      - "deploy/**/Dockerfile"
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ["main"]
    paths:
      - "deploy/**/Dockerfile"
  workflow_dispatch:
  schedule:
    - cron: "50 23 * * *"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build container images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: "Backend Container"
            context: .
            dockerfile: deploy/build/back/Containerfile
            image_name: ${{ github.repository_owner }}/proxyauthk8s/server
          - name: "Frontend Container"
            context: .
            dockerfile: deploy/build/front/Containerfile
            image_name: ${{ github.repository_owner }}/proxyauthk8s/front
    permissions:
      contents: read
      packages: write
    outputs:
      image_backend: ${{ env.REGISTRY }}/${{ github.repository_owner }}/proxyauthk8s/server:${{ github.sha }}
      image_frontend: ${{ env.REGISTRY }}/${{ github.repository_owner }}/proxyauthk8s/front:${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ matrix.image_name }}:${GITHUB_SHA}"
          IMAGE_TAG_BRANCH="${{ env.REGISTRY }}/${{ matrix.image_name }}:${GITHUB_REF_NAME}"
          docker buildx build \
            --platform linux/amd64 \
            --tag $IMAGE_TAG \
            --tag $IMAGE_TAG_BRANCH \
            --file ${{ matrix.dockerfile }} \
            --push ${{ matrix.context }}

  scan:
    name: Scan container images for CVEs
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: "Backend Container"
            image_name: ${{ github.repository_owner }}/proxyauthk8s/server
            artifact_name: trivy-backend
          - name: "Frontend Container"
            image_name: ${{ github.repository_owner }}/proxyauthk8s/front
            artifact_name: trivy-frontend
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan Image for CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ github.sha }}
          format: sarif
          output: trivy-report.sarif
      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: trivy-report.sarif

  upload-sarif:
    name: Upload SARIF to GitHub Security
    needs: scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - artifact_name: trivy-backend
          - artifact_name: trivy-frontend
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Download SARIF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.artifact_name }}
      - name: Upload scan results to GitHub
        uses: github/codeql-action/upload-sarif@c6f931105cb2c34c8f901cc885ba1e2e259cf745 # v4.34.0
        with:
          sarif_file: trivy-report.sarif
          wait-for-processing: true
