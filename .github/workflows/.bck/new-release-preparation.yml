name: 🚀 New Release Preparation

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type de release"
        required: true
        default: "minor"
        type: choice
        options:
          - patch
          - minor
          - major
      pre_release:
        description: "Pre-release (alpha, beta, rc)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  REPO_NAME_LOWER: ${{ format('{0}', github.event.repository.name) }}
  IMAGE_NAME_SERVER: ${{ github.repository_owner }}/proxyauthk8s/server
  IMAGE_NAME_FRONT: ${{ github.repository_owner }}/proxyauthk8s/front
  NODE_VERSION: "24"
  RUST_VERSION: "1.91"

jobs:
  prepare-release:
    name: 📋 Prepare Release Information
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      branch_name: ${{ steps.branch.outputs.branch_name }}
      release_name: ${{ steps.release_info.outputs.release_name }}
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: 🔍 Debug npm environment
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Package-lock exists: $(test -f package-lock.json && echo 'yes' || echo 'no')"
          ls -la package*.json

      - name: 🔧 Install dependencies
        run: |
          yarn install --frozen-lockfile
        env:
          NODE_ENV: production

      - name: 📈 Calculate new version
        id: version
        run: |
          current_version=$(node -p "require('./package.json').version")
          echo "Current version: $current_version"

          # Increment version based on input
          case "${{ github.event.inputs.release_type }}" in
            "major")
              new_version=$(npm version major --no-git-tag-version | sed 's/v//')
              ;;
            "minor")
              new_version=$(npm version minor --no-git-tag-version | sed 's/v//')
              ;;
            "patch")
              new_version=$(npm version patch --no-git-tag-version | sed 's/v//')
              ;;
          esac

          # Add pre-release suffix if specified
          if [ -n "${{ github.event.inputs.pre_release }}" ]; then
            new_version="${new_version}-${{ github.event.inputs.pre_release }}"
          fi

          echo "New version: $new_version"
          echo "new_version=$new_version" >> $GITHUB_OUTPUT

          # Reset package.json to avoid commit issues
          git checkout -- package.json

      - name: 🌿 Create branch name
        id: branch
        run: |
          branch_name="NR/release-v${{ steps.version.outputs.new_version }}"
          echo "branch_name=$branch_name" >> $GITHUB_OUTPUT

      - name: 📝 Generate release name
        id: release_info
        run: |
          release_name="Release v${{ steps.version.outputs.new_version }}"
          echo "release_name=$release_name" >> $GITHUB_OUTPUT

  create-release-branch:
    name: 🌿 Create Release Branch
    runs-on: ubuntu-latest
    needs: prepare-release
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🌿 Create and push release branch
        run: |
          git checkout -b "${{ needs.prepare-release.outputs.branch_name }}"
          git push -u origin "${{ needs.prepare-release.outputs.branch_name }}"

  code-quality-validation:
    name: 🔍 Code Quality Validation
    runs-on: ubuntu-latest
    needs: [prepare-release, create-release-branch]
    outputs:
      backend_quality: ${{ steps.backend_check.outputs.status }}
      frontend_quality: ${{ steps.frontend_check.outputs.status }}
    steps:
      - name: 🔍 Checkout release branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.prepare-release.outputs.branch_name }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: 🔧 Install dependencies
        run: |
          yarn install --frozen-lockfile
        env:
          NODE_ENV: production

      - name: 🔍 Backend Quality Check
        id: backend_check
        run: |
          echo "## 🦀 Backend Quality Report" >> quality_report.md

          # Rust formatting check
          if cargo fmt -- --check; then
            echo "✅ Rust code formatting is correct" >> quality_report.md
          else
            echo "❌ Rust code formatting issues found" >> quality_report.md
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Rust clippy check
          if cargo clippy --all-targets --all-features -- -D warnings; then
            echo "✅ Rust clippy checks passed" >> quality_report.md
          else
            echo "❌ Rust clippy issues found" >> quality_report.md
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Rust tests
          if cargo test; then
            echo "✅ Rust tests passed" >> quality_report.md
          else
            echo "❌ Rust tests failed" >> quality_report.md
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 🔍 Frontend Quality Check
        id: frontend_check
        run: |
          echo "## 🌐 Frontend Quality Report" >> quality_report.md
          yarn install

          # TypeScript compilation
          if yarn build; then
            echo "✅ TypeScript compilation successful" >> quality_report.md
          else
            echo "❌ TypeScript compilation failed" >> quality_report.md
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Linting
          if yarn nx lint front; then
            echo "✅ Frontend linting passed" >> quality_report.md
          else
            echo "❌ Frontend linting issues found" >> quality_report.md
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 📤 Upload Quality Report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: quality-report
          path: quality_report.md

  changelog-generation:
    name: 📝 Generate Changelog
    runs-on: ubuntu-latest
    needs: [prepare-release, create-release-branch]
    steps:
      - name: 🔍 Checkout release branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.prepare-release.outputs.branch_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔧 Install changelog generator
        run: npm install -g conventional-changelog-cli

      - name: 📝 Generate changelog
        run: |
          NEW_VERSION="${{ needs.prepare-release.outputs.new_version }}"

          # Generate changelog for this version
          conventional-changelog -p angular -i CHANGELOG.md -s -r 0

          # Create version-specific changelog
          echo "# Changelog for v$NEW_VERSION" > "CHANGELOG-v$NEW_VERSION.md"
          echo "" >> "CHANGELOG-v$NEW_VERSION.md"
          conventional-changelog -p angular -r 1 >> "CHANGELOG-v$NEW_VERSION.md"

      - name: 🔧 Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 📝 Generate Release Guide and Commit
        run: |
          NEW_VERSION="${{ needs.prepare-release.outputs.new_version }}"
          BRANCH_NAME="${{ needs.prepare-release.outputs.branch_name }}"

          # Generate release guide
          cat > "RELEASE-GUIDE-v$NEW_VERSION.md" << EOF
          # 🚀 Release Guide for v$NEW_VERSION

          ## 📋 How to Upgrade the Release Branch

          ### 🔄 Sync with Latest Changes
          \`\`\`bash
          # Switch to the release branch
          git checkout $BRANCH_NAME

          # Pull latest changes from remote
          git pull origin $BRANCH_NAME

          # Merge latest changes from main (if needed)
          git merge origin/main

          # Push updated branch
          git push origin $BRANCH_NAME
          \`\`\`

          ### 🔧 Manual Version Updates (if needed)
          \`\`\`bash
          # Update package.json version manually
          npm version $NEW_VERSION --no-git-tag-version

          # Update all Cargo.toml files
          find . -name "Cargo.toml" -not -path "./target/*" -exec sed -i 's/^version = ".*"/version = "$NEW_VERSION"/' {} \\;

          # Update frontend package.json files
          find apps libs -name "package.json" -exec jq '.version = "$NEW_VERSION"' {} \\; > tmp && mv tmp {}

          # Commit version changes
          git add .
          git commit -m "chore: manual version bump to v$NEW_VERSION"
          git push origin $BRANCH_NAME
          \`\`\`

          ## ✍️ How to Sign All Commits in the Branch

          ### 🔑 Setup GPG Signing (First Time)
          \`\`\`bash
          # Generate a new GPG key (if you don't have one)
          gpg --full-generate-key

          # List your GPG keys and copy the key ID
          gpg --list-secret-keys --keyid-format=long

          # Configure git to use your GPG key
          git config --global user.signingkey YOUR_KEY_ID
          git config --global commit.gpgsign true

          # Export your public key and add it to GitHub
          gpg --armor --export YOUR_KEY_ID
          \`\`\`

          ### 📝 Sign Commits Retroactively
          \`\`\`bash
          # Switch to release branch
          git checkout $BRANCH_NAME

          # Interactive rebase to sign all commits since main
          git rebase --exec 'git commit --amend --no-edit -S' origin/main

          # Alternative: Sign specific range of commits
          git rebase -i --exec 'git commit --amend --no-edit -S' HEAD~N  # N = number of commits

          # Force push the signed commits (⚠️ Use with caution)
          git push --force-with-lease origin $BRANCH_NAME
          \`\`\`

          ### 🔒 Sign Individual New Commits
          \`\`\`bash
          # Enable signing for current repository
          git config commit.gpgsign true

          # Make a signed commit
          git commit -S -m "feat: your commit message"

          # Verify commit is signed
          git log --show-signature -1
          \`\`\`

          ## 🛠️ Troubleshooting

          ### 🔍 Common Issues

          #### GPG Key Not Found
          \`\`\`bash
          # Check if GPG is working
          gpg --version

          # List available keys
          gpg --list-keys

          # Test GPG signing
          echo "test" | gpg --clearsign
          \`\`\`

          #### Merge Conflicts During Upgrade
          \`\`\`bash
          # Abort current merge
          git merge --abort

          # Try merge with strategy
          git merge -X ours origin/main  # Prefer release branch changes
          # OR
          git merge -X theirs origin/main  # Prefer main branch changes

          # Manual conflict resolution
          git mergetool
          git commit -m "resolve: merge conflicts with main"
          \`\`\`

          #### Force Push Safety
          \`\`\`bash
          # Always use force-with-lease instead of force
          git push --force-with-lease origin $BRANCH_NAME

          # Check what will be pushed before forcing
          git log origin/$BRANCH_NAME..HEAD --oneline
          \`\`\`

          ## 📊 Quality Checks

          ### ✅ Pre-Push Validation
          \`\`\`bash
          # Run local quality checks
          cargo fmt --check
          cargo clippy --all-targets --all-features
          cargo test
          yarn lint
          yarn build

          # Check commit messages format
          cog check --from-latest-tag

          # Verify all commits are signed
          git log --pretty="format:%h %G? %s" origin/main..HEAD
          # Look for 'G' (good signature) or 'U' (unknown signature)
          \`\`\`

          ### 🔄 Update Reports
          After making changes to the release branch, the \`update-release-reports.yml\` workflow will automatically:
          - 🔍 Re-run quality checks
          - 🔒 Update security audits
          - 🐳 Rebuild Docker images
          - 💬 Update PR comments with latest status

          ## 🎯 Final Steps

          1. ✅ Ensure all CI checks pass
          2. 🔍 Review PR description and reports
          3. 👥 Request code review from team
          4. 🚀 Merge PR when approved
          5. 🤖 **Automatic**: Tag and GitHub release will be created automatically
          6. 📢 Announce release to stakeholders

          ## 🤖 Automatic Release Creation

          When this PR is merged to main:
          - 🏷️ A git tag \`vX.Y.Z\` will be automatically created
          - 📋 A GitHub release will be published with:
            - 📝 Release notes generated from this PR
            - 🔗 Links to Docker images and Helm charts
            - 📦 Downloadable artifacts (SBOM, reports, etc.)
          - 💬 A comment will be added to this PR confirming the release

          **No manual intervention required** - the \`create-release-on-merge.yml\` workflow handles everything!
          EOF

          # Only commit the main CHANGELOG.md to repository
          git add CHANGELOG.md
          git commit -m "docs: update changelog for v${{ needs.prepare-release.outputs.new_version }}"
          git push origin "${{ needs.prepare-release.outputs.branch_name }}"

          echo "📋 Changelog and release guide generated for artifacts only - not committed to repository"

      - name: 📤 Upload Changelog and Guide
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: changelog
          path: |
            CHANGELOG-v*.md
            RELEASE-GUIDE-v*.md

  security-audit:
    name: 🔒 Security & Dependencies Audit
    runs-on: ubuntu-latest
    needs: [prepare-release, create-release-branch]
    outputs:
      audit_status: ${{ steps.audit.outputs.status }}
    steps:
      - name: 🔍 Checkout release branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.prepare-release.outputs.branch_name }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: 🔧 Install audit tools
        run: |
          npm install -g npm-audit-resolver
          cargo install cargo-audit

      - name: 🔍 NPM Security Audit
        id: audit
        run: |
          echo "## 🔒 Security Audit Report" > security_report.md
          echo "" >> security_report.md

          # NPM Audit
          echo "### 📦 NPM Dependencies" >> security_report.md
          if npm audit --audit-level=moderate; then
            echo "✅ No moderate or high severity vulnerabilities found in NPM packages" >> security_report.md
          else
            echo "❌ Security vulnerabilities found in NPM packages" >> security_report.md
            npm audit --json >> security_report.md
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Cargo Audit with severity filtering
          echo "### 🦀 Rust Dependencies" >> security_report.md

          # Run cargo audit and capture JSON output
          if cargo audit --format json > cargo_audit_output.json 2>/dev/null; then
            echo "✅ No security vulnerabilities found in Rust packages" >> security_report.md
          else
            # Parse JSON output to filter by severity > 7
            high_severity_count=$(jq -r '
              [.vulnerabilities.list[] |
               select(.advisory.cvss and (.advisory.cvss | tonumber) > 7.0)] |
              length' cargo_audit_output.json 2>/dev/null || echo "0")

            total_vulns=$(jq -r '.vulnerabilities.count // 0' cargo_audit_output.json 2>/dev/null || echo "0")

            echo "Found $total_vulns total vulnerabilities, $high_severity_count with severity > 7.0" >> security_report.md
            echo "" >> security_report.md

            # Add detailed vulnerability report
            echo "#### 🔍 Vulnerability Details" >> security_report.md
            jq -r '.vulnerabilities.list[] |
              "- **\(.advisory.id)**: \(.advisory.title) (CVSS: \(.advisory.cvss // "N/A"))" +
              "\n  - Package: \(.package.name) v\(.package.version)" +
              "\n  - Severity: \(if .advisory.cvss and (.advisory.cvss | tonumber) > 7.0 then "🔴 HIGH" else "🟡 LOW/MEDIUM" end)" +
              "\n"' cargo_audit_output.json >> security_report.md 2>/dev/null || echo "- Error parsing vulnerability details" >> security_report.md

            # Only fail if high severity vulnerabilities found
            if [ "$high_severity_count" -gt 0 ]; then
              echo "❌ $high_severity_count high-severity vulnerabilities (CVSS > 7.0) found in Rust packages" >> security_report.md
              echo "status=failed" >> $GITHUB_OUTPUT
              exit 1
            else
              echo "✅ No high-severity vulnerabilities (CVSS > 7.0) found, but $total_vulns lower-severity issues exist" >> security_report.md
            fi
          fi

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 📤 Upload Security Report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: security-report
          path: security_report.md

  commit-validation:
    name: ✅ Commit Validation
    runs-on: ubuntu-latest
    needs: [prepare-release, create-release-branch]
    outputs:
      commit_status: ${{ steps.validate.outputs.status }}
    steps:
      - name: 🔍 Checkout release branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.prepare-release.outputs.branch_name }}
          fetch-depth: 0

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: 🔧 Install Cocogitto
        run: |
          cargo install --locked cocogitto

      - name: ✅ Validate Conventional Commits with Cocogitto
        id: validate
        run: |
          echo "## ✅ Commit Validation Report" > commit_report.md
          echo "" >> commit_report.md

          echo "### 📝 Cocogitto Conventional Commit Validation" >> commit_report.md
          failed=false

          # Check if any tags exist
          if git tag -l | grep -q .; then
            echo "Tags found, checking commits from latest tag..."
            cog_command="cog check --from-latest-tag"
          else
            echo "No tags found, checking all commits..."
            cog_command="cog check"
          fi

          # Run cog check to validate commits
          if $cog_command 2>&1 | tee cog_output.txt; then
            echo "✅ All commits follow conventional commit format" >> commit_report.md
            echo "" >> commit_report.md
            echo "Command used: \`$cog_command\`" >> commit_report.md
            echo "" >> commit_report.md
            echo "\`\`\`" >> commit_report.md
            cat cog_output.txt >> commit_report.md
            echo "\`\`\`" >> commit_report.md
          else
            echo "❌ Some commits don't follow conventional commit format" >> commit_report.md
            echo "" >> commit_report.md
            echo "Command used: \`$cog_command\`" >> commit_report.md
            echo "" >> commit_report.md
            echo "\`\`\`" >> commit_report.md
            cat cog_output.txt >> commit_report.md
            echo "\`\`\`" >> commit_report.md
            failed=true
          fi

          # Validate commit signatures
          echo "" >> commit_report.md
          echo "### ✍️ Commit Signature Validation" >> commit_report.md
          for commit in $commits; do
            if git verify-commit $commit 2>/dev/null; then
              echo "✅ Commit $commit is signed" >> commit_report.md
            else
              echo "❌ Commit $commit is not signed" >> commit_report.md
              failed=true
            fi
          done

          if [ "$failed" = true ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: 📤 Upload Commit Report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: commit-report
          path: commit_report.md

  docker-build:
    name: 🐳 Docker Build & SBOM Generation
    runs-on: ubuntu-latest
    needs:
      [
        prepare-release,
        code-quality-validation,
        security-audit,
        commit-validation,
      ]
    if: needs.code-quality-validation.outputs.backend_quality == 'success' && needs.code-quality-validation.outputs.frontend_quality == 'success'
    outputs:
      server_image: ${{ steps.build_server.outputs.image }}
      front_image: ${{ steps.build_front.outputs.image }}
    steps:
      - name: 🔍 Checkout release branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.prepare-release.outputs.branch_name }}

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: 🔐 Login to Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Syft for SBOM generation
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: 🏗️ Build Server Image
        id: build_server
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}:v${{ needs.prepare-release.outputs.new_version }}"

          docker buildx build \
            --platform linux/amd64 \
            --tag $IMAGE_TAG \
            --file deploy/build/back/Containerfile \
            --push .

          echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: 🏗️ Build Front Image
        id: build_front
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONT }}:v${{ needs.prepare-release.outputs.new_version }}"

          docker buildx build \
            --platform linux/amd64 \
            --tag $IMAGE_TAG \
            --file deploy/build/front/Containerfile \
            --push .

          echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: 📋 Generate SBOM for Server
        run: |
          syft ${{ steps.build_server.outputs.image }} -o spdx-json=server-sbom.json
          syft ${{ steps.build_server.outputs.image }} -o table=server-sbom.txt

      - name: 📋 Generate SBOM for Front
        run: |
          syft ${{ steps.build_front.outputs.image }} -o spdx-json=front-sbom.json
          syft ${{ steps.build_front.outputs.image }} -o table=front-sbom.txt

      - name: 📤 Upload SBOM artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: sbom-reports
          path: |
            *-sbom.json
            *-sbom.txt

  docker-security-scan:
    name: 🔍 Docker Security Scan
    runs-on: ubuntu-latest
    needs: [prepare-release, docker-build]
    steps:
      - name: 🔧 Install Grype for vulnerability scanning
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: 🔍 Scan Server Image for vulnerabilities
        run: |
          echo "## 🐳 Docker Security Scan Report" > docker_security_report.md
          echo "" >> docker_security_report.md

          echo "### 🖥️ Server Image Vulnerabilities" >> docker_security_report.md
          grype ${{ needs.docker-build.outputs.server_image }} -o table >> docker_security_report.md

          echo "" >> docker_security_report.md
          echo "### 🌐 Frontend Image Vulnerabilities" >> docker_security_report.md
          grype ${{ needs.docker-build.outputs.front_image }} -o table >> docker_security_report.md

      - name: 📤 Upload Docker Security Report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: docker-security-report
          path: docker_security_report.md

  swagger-validation:
    name: 📋 Swagger Generation & Validation
    runs-on: ubuntu-latest
    needs: [prepare-release, code-quality-validation]
    if: needs.code-quality-validation.outputs.backend_quality == 'success'
    steps:
      - name: 🔍 Checkout release branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.prepare-release.outputs.branch_name }}

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔧 Install Swagger tools
        run: |
          npm install -g swagger-jsdoc swagger2openapi @apidevtools/swagger-cli

      - name: 📋 Generate and validate Swagger
        run: |
          echo "## 📋 Swagger Validation Report" > swagger_report.md
          echo "" >> swagger_report.md

          # Generate swagger (assuming you have a generation script)
          if [ -f "scripts/generate-swagger.sh" ]; then
            ./scripts/generate-swagger.sh
            echo "✅ Swagger generated successfully" >> swagger_report.md
          else
            cargo run --bin swaggergen
            echo "✅ Swagger generated via Rust binary" >> swagger_report.md
          fi

          # Validate swagger file
          if swagger-cli validate swagger.json; then
            echo "✅ Swagger validation passed" >> swagger_report.md
          else
            echo "❌ Swagger validation failed" >> swagger_report.md
          fi
      - name: 📤 Upload Swagger Report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: swagger-report
          path: swagger_report.md

  helm-build:
    name: ⎈ Helm Chart Build & OCI Package
    runs-on: ubuntu-latest
    needs: [prepare-release, code-quality-validation]
    if: needs.code-quality-validation.outputs.backend_quality == 'success'
    outputs:
      main_chart_version: ${{ steps.build_charts.outputs.main_chart_version }}
      crd_chart_version: ${{ steps.build_charts.outputs.crd_chart_version }}
      main_chart_oci: ${{ steps.build_charts.outputs.main_chart_oci }}
      crd_chart_oci: ${{ steps.build_charts.outputs.crd_chart_oci }}
    steps:
      - name: 🔍 Checkout release branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.prepare-release.outputs.branch_name }}

      - name: ⎈ Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "latest"

      - name: 🔐 Login to Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Helm plugins
        run: |
          helm plugin install https://github.com/chartmuseum/helm-push || true
          helm plugin install https://github.com/databus23/helm-diff || true

      - name: ⎈ Build, validate and push Helm charts as OCI artifacts
        id: build_charts
        run: |
          echo "## ⎈ Helm Chart Build & OCI Package Report" > helm_report.md
          echo "" >> helm_report.md

          # Create directory for packaged charts
          mkdir -p helm-packages

          NEW_VERSION="${{ needs.prepare-release.outputs.new_version }}"
          REGISTRY="${{ env.REGISTRY }}"
          REPO_OWNER="${{ github.repository_owner }}"

          # OCI registry paths
          MAIN_CHART_OCI_PATH="oci://${REGISTRY}/${REPO_OWNER}/proxyauthk8s/helm-proxyauthk8s"
          CRD_CHART_OCI_PATH="oci://${REGISTRY}/${REPO_OWNER}/proxyauthk8s/helm-proxyauthk8s-crd"

          # Update chart versions
          echo "### 📈 Version Updates" >> helm_report.md

          # Update main chart version
          sed -i "s/^version: .*/version: $NEW_VERSION/" deploy/chart/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: $NEW_VERSION/" deploy/chart/Chart.yaml

          # Update CRD chart version
          sed -i "s/^version: .*/version: $NEW_VERSION/" deploy/chart-crd/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: $NEW_VERSION/" deploy/chart-crd/Chart.yaml

          echo "✅ Updated chart versions to v$NEW_VERSION" >> helm_report.md
          echo "" >> helm_report.md

          # Validate and build main chart
          echo "### 📦 Main Chart (proxyauthk8s)" >> helm_report.md

          # Lint main chart
          if helm lint deploy/chart/; then
            echo "✅ Main chart linting passed" >> helm_report.md
          else
            echo "❌ Main chart linting failed" >> helm_report.md
            exit 1
          fi

          # Template main chart to validate
          if helm template proxyauthk8s deploy/chart/ > /dev/null; then
            echo "✅ Main chart templating successful" >> helm_report.md
          else
            echo "❌ Main chart templating failed" >> helm_report.md
            exit 1
          fi

          # Package main chart
          if helm package deploy/chart/ -d helm-packages/; then
            MAIN_CHART_FILE=$(ls helm-packages/chart-*.tgz | head -1)
            echo "✅ Main chart packaged: $(basename $MAIN_CHART_FILE)" >> helm_report.md
          else
            echo "❌ Main chart packaging failed" >> helm_report.md
            exit 1
          fi

          # Push main chart as OCI artifact
          if helm push "$MAIN_CHART_FILE" "$MAIN_CHART_OCI_PATH"; then
            echo "🚀 Main chart pushed as OCI artifact: ${MAIN_CHART_OCI_PATH}:${NEW_VERSION}" >> helm_report.md
          else
            echo "❌ Main chart OCI push failed" >> helm_report.md
            exit 1
          fi

          echo "" >> helm_report.md

          # Validate and build CRD chart
          echo "### 📦 CRD Chart (proxyauthk8s-crd)" >> helm_report.md

          # Lint CRD chart
          if helm lint deploy/chart-crd/; then
            echo "✅ CRD chart linting passed" >> helm_report.md
          else
            echo "❌ CRD chart linting failed" >> helm_report.md
            exit 1
          fi

          # Template CRD chart to validate
          if helm template proxyauthk8s-crd deploy/chart-crd/ > /dev/null; then
            echo "✅ CRD chart templating successful" >> helm_report.md
          else
            echo "❌ CRD chart templating failed" >> helm_report.md
            exit 1
          fi

          # Package CRD chart
          if helm package deploy/chart-crd/ -d helm-packages/; then
            CRD_CHART_FILE=$(ls helm-packages/chart-crd-*.tgz | head -1)
            echo "✅ CRD chart packaged: $(basename $CRD_CHART_FILE)" >> helm_report.md
          else
            echo "❌ CRD chart packaging failed" >> helm_report.md
            exit 1
          fi

          # Push CRD chart as OCI artifact
          if helm push "$CRD_CHART_FILE" "$CRD_CHART_OCI_PATH"; then
            echo "🚀 CRD chart pushed as OCI artifact: ${CRD_CHART_OCI_PATH}:${NEW_VERSION}" >> helm_report.md
          else
            echo "❌ CRD chart OCI push failed" >> helm_report.md
            exit 1
          fi

          echo "" >> helm_report.md

          # Generate chart documentation
          echo "### 📋 Chart Information" >> helm_report.md
          echo "" >> helm_report.md
          echo "#### Main Chart Details" >> helm_report.md
          echo "\`\`\`yaml" >> helm_report.md
          helm show chart deploy/chart/ >> helm_report.md
          echo "\`\`\`" >> helm_report.md
          echo "" >> helm_report.md

          echo "#### CRD Chart Details" >> helm_report.md
          echo "\`\`\`yaml" >> helm_report.md
          helm show chart deploy/chart-crd/ >> helm_report.md
          echo "\`\`\`" >> helm_report.md
          echo "" >> helm_report.md

          # OCI Artifact information
          echo "### 🐳 OCI Artifact Information" >> helm_report.md
          echo "" >> helm_report.md
          echo "#### Installation Commands" >> helm_report.md
          echo "\`\`\`bash" >> helm_report.md
          echo "# Install CRD chart first" >> helm_report.md
          echo "helm install proxyauthk8s-crd ${CRD_CHART_OCI_PATH}:${NEW_VERSION}" >> helm_report.md
          echo "" >> helm_report.md
          echo "# Install main chart" >> helm_report.md
          echo "helm install proxyauthk8s ${MAIN_CHART_OCI_PATH}:${NEW_VERSION}" >> helm_report.md
          echo "\`\`\`" >> helm_report.md
          echo "" >> helm_report.md

          echo "#### Upgrade Commands" >> helm_report.md
          echo "\`\`\`bash" >> helm_report.md
          echo "# Upgrade CRD chart" >> helm_report.md
          echo "helm upgrade proxyauthk8s-crd ${CRD_CHART_OCI_PATH}:${NEW_VERSION}" >> helm_report.md
          echo "" >> helm_report.md
          echo "# Upgrade main chart" >> helm_report.md
          echo "helm upgrade proxyauthk8s ${MAIN_CHART_OCI_PATH}:${NEW_VERSION}" >> helm_report.md
          echo "\`\`\`" >> helm_report.md
          echo "" >> helm_report.md

          # Set outputs
          echo "main_chart_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "crd_chart_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "main_chart_oci=${MAIN_CHART_OCI_PATH}:${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "crd_chart_oci=${CRD_CHART_OCI_PATH}:${NEW_VERSION}" >> $GITHUB_OUTPUT

          # List packaged charts
          echo "### 📦 Local Packaged Charts" >> helm_report.md
          echo "" >> helm_report.md
          for chart in helm-packages/*.tgz; do
            if [ -f "$chart" ]; then
              chart_size=$(du -h "$chart" | cut -f1)
              echo "- 📦 \`$(basename "$chart")\` (${chart_size})" >> helm_report.md
            fi
          done

          echo "" >> helm_report.md
          echo "### 🌐 Published OCI Artifacts" >> helm_report.md
          echo "" >> helm_report.md
          echo "- 🎯 **Main Chart**: \`${MAIN_CHART_OCI_PATH}:${NEW_VERSION}\`" >> helm_report.md
          echo "- 🎯 **CRD Chart**: \`${CRD_CHART_OCI_PATH}:${NEW_VERSION}\`" >> helm_report.md

      - name: 📤 Upload Helm packages
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: helm-packages
          path: helm-packages/*.tgz

      - name: 📤 Upload Helm report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: helm-report
          path: helm_report.md

  version-increment:
    name: 📈 Increment Package Versions
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - create-release-branch
      - code-quality-validation
      - changelog-generation
      - security-audit
      - commit-validation
      - docker-build
      - docker-security-scan
      - swagger-validation
      - helm-build
      - create-pull-request
    if: always() && needs.prepare-release.result == 'success'
    steps:
      - name: 🔍 Checkout release branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.prepare-release.outputs.branch_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 🔧 Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 📈 Update package versions
        run: |
          NEW_VERSION="${{ needs.prepare-release.outputs.new_version }}"

          # Update root package.json
          npm version $NEW_VERSION --no-git-tag-version

          # Update Rust packages
          find . -name "Cargo.toml" -not -path "./target/*" | while read -r cargo_file; do
            echo "Updating $cargo_file"
            sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" "$cargo_file"
          done

          # Update front-end packages
          find apps libs -name "package.json" | while read -r pkg_file; do
            echo "Updating $pkg_file"
            jq --arg version "$NEW_VERSION" '.version = $version' "$pkg_file" > tmp.$$ && mv tmp.$$ "$pkg_file"
          done

          # Commit changes
          git add .
          git commit -m "chore: bump version to v$NEW_VERSION"
          git push origin "${{ needs.prepare-release.outputs.branch_name }}"

  create-pull-request:
    name: 🔀 Create Release Pull Request
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - create-release-branch
      - code-quality-validation
      - changelog-generation
      - security-audit
      - commit-validation
      - docker-build
      - docker-security-scan
      - swagger-validation
      - helm-build
    if: always() && needs.prepare-release.result == 'success'
    steps:
      - name: 🔍 Checkout release branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.prepare-release.outputs.branch_name }}

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0

      - name: 📝 Create comprehensive PR body
        run: |
          echo "# 🚀 ${{ needs.prepare-release.outputs.release_name }}" > pr_body.md
          echo "" >> pr_body.md
          echo "This pull request prepares the release for version \`v${{ needs.prepare-release.outputs.new_version }}\`." >> pr_body.md
          echo "" >> pr_body.md

          echo "## 📊 Release Preparation Summary" >> pr_body.md
          echo "" >> pr_body.md
          echo "| Check | Status |" >> pr_body.md
          echo "|-------|--------|" >> pr_body.md
          echo "| 📈 Version Increment | ✅ Completed |" >> pr_body.md
          echo "| 🔍 Code Quality (Backend) | ${{ needs.code-quality-validation.outputs.backend_quality == 'success' && '✅ Passed' || '❌ Failed' }} |" >> pr_body.md
          echo "| 🔍 Code Quality (Frontend) | ${{ needs.code-quality-validation.outputs.frontend_quality == 'success' && '✅ Passed' || '❌ Failed' }} |" >> pr_body.md
          echo "| 📝 Changelog | ${{ needs.changelog-generation.result == 'success' && '✅ Generated' || '❌ Failed' }} |" >> pr_body.md
          echo "| 🔒 Security Audit | ${{ needs.security-audit.outputs.audit_status == 'success' && '✅ Passed' || '❌ Failed' }} |" >> pr_body.md
          echo "| ✅ Commit Validation | ${{ needs.commit-validation.outputs.commit_status == 'success' && '✅ Passed' || '❌ Failed' }} |" >> pr_body.md
          echo "| 🐳 Docker Build | ${{ needs.docker-build.result == 'success' && '✅ Built' || '❌ Failed' }} |" >> pr_body.md
          echo "| 🔍 Docker Security | ${{ needs.docker-security-scan.result == 'success' && '✅ Scanned' || '❌ Failed' }} |" >> pr_body.md
          echo "| 📋 Swagger Validation | ${{ needs.swagger-validation.result == 'success' && '✅ Validated' || '❌ Failed' }} |" >> pr_body.md
          echo "| ⎈ Helm Charts | ${{ needs.helm-build.result == 'success' && '✅ Built & Published as OCI' || '❌ Failed' }} |" >> pr_body.md
          echo "" >> pr_body.md

          echo "## 📋 Detailed Reports" >> pr_body.md
          echo "" >> pr_body.md

          # Add detailed reports from downloaded artifacts
          if [ -f "quality-report/quality_report.md" ]; then
            cat quality-report/quality_report.md >> pr_body.md
            echo "" >> pr_body.md
          fi

          if [ -f "security-report/security_report.md" ]; then
            cat security-report/security_report.md >> pr_body.md
            echo "" >> pr_body.md
          fi

          if [ -f "commit-report/commit_report.md" ]; then
            cat commit-report/commit_report.md >> pr_body.md
            echo "" >> pr_body.md
          fi

          if [ -f "docker-security-report/docker_security_report.md" ]; then
            cat docker-security-report/docker_security_report.md >> pr_body.md
            echo "" >> pr_body.md
          fi

          if [ -f "swagger-report/swagger_report.md" ]; then
            cat swagger-report/swagger_report.md >> pr_body.md
            echo "" >> pr_body.md
          fi

          if [ -f "helm-report/helm_report.md" ]; then
            cat helm-report/helm_report.md >> pr_body.md
            echo "" >> pr_body.md
          fi

          echo "## 🏗️ Built Artifacts" >> pr_body.md
          echo "" >> pr_body.md
          echo "### Docker Images" >> pr_body.md
          echo "- 🖥️ Server: \`${{ needs.docker-build.outputs.server_image }}\`" >> pr_body.md
          echo "- 🌐 Frontend: \`${{ needs.docker-build.outputs.front_image }}\`" >> pr_body.md
          echo "" >> pr_body.md

          echo "### ⎈ Helm Charts (OCI Artifacts)" >> pr_body.md
          echo "- 🎯 Main Chart: \`${{ needs.helm-build.outputs.main_chart_oci }}\`" >> pr_body.md
          echo "- 🎯 CRD Chart: \`${{ needs.helm-build.outputs.crd_chart_oci }}\`" >> pr_body.md
          echo "- 📦 Traditional packages available in workflow artifacts" >> pr_body.md
          echo "" >> pr_body.md
          echo "#### Installation Commands" >> pr_body.md
          echo "\`\`\`bash" >> pr_body.md
          echo "# Install CRD chart first" >> pr_body.md
          echo "helm install proxyauthk8s-crd ${{ needs.helm-build.outputs.crd_chart_oci }}" >> pr_body.md
          echo "" >> pr_body.md
          echo "# Install main chart" >> pr_body.md
          echo "helm install proxyauthk8s ${{ needs.helm-build.outputs.main_chart_oci }}" >> pr_body.md
          echo "\`\`\`" >> pr_body.md
          echo "" >> pr_body.md

          echo "### 📋 SBOM Reports" >> pr_body.md
          echo "- Server and Frontend SBOM available in workflow artifacts" >> pr_body.md
          echo "- Download artifacts from the Actions tab to access SBOM files" >> pr_body.md
          echo "" >> pr_body.md

          # Add changelog from downloaded artifacts (not committed files)
          if [ -f "changelog/CHANGELOG-v${{ needs.prepare-release.outputs.new_version }}.md" ]; then
            echo "## 📝 Changelog" >> pr_body.md
            echo "" >> pr_body.md
            cat "changelog/CHANGELOG-v${{ needs.prepare-release.outputs.new_version }}.md" >> pr_body.md
            echo "" >> pr_body.md
          fi

          # Add release guide from downloaded artifacts (not committed files)
          if [ -f "changelog/RELEASE-GUIDE-v${{ needs.prepare-release.outputs.new_version }}.md" ]; then
            echo "## 📋 Release Management Guide" >> pr_body.md
            echo "" >> pr_body.md
            echo "<details>" >> pr_body.md
            echo "<summary>🚀 Click to expand release management instructions</summary>" >> pr_body.md
            echo "" >> pr_body.md
            cat "changelog/RELEASE-GUIDE-v${{ needs.prepare-release.outputs.new_version }}.md" >> pr_body.md
            echo "" >> pr_body.md
            echo "</details>" >> pr_body.md
            echo "" >> pr_body.md
          fi

          echo "## 🤖 Automatic Release Creation" >> pr_body.md
          echo "" >> pr_body.md
          echo "When this PR is merged, the following will happen automatically:" >> pr_body.md
          echo "- 🏷️ **Git Tag**: A tag \`v${{ needs.prepare-release.outputs.new_version }}\` will be created" >> pr_body.md
          echo "- 📋 **GitHub Release**: A release will be published with comprehensive notes" >> pr_body.md
          echo "- 💬 **PR Comment**: A confirmation comment will be added to this PR" >> pr_body.md
          echo "- 🔗 **Asset Links**: Direct links to Docker images and Helm charts" >> pr_body.md
          echo "" >> pr_body.md
          echo "**No manual intervention required!** The \`create-release-on-merge.yml\` workflow handles everything." >> pr_body.md
          echo "" >> pr_body.md
          echo "## 📎 Workflow Artifacts" >> pr_body.md
          echo "" >> pr_body.md
          echo "All detailed reports and SBOM files are available as downloadable artifacts:" >> pr_body.md
          echo "- 📊 **Quality Report**: Code quality analysis results" >> pr_body.md
          echo "- 🔒 **Security Report**: Vulnerability audit findings" >> pr_body.md
          echo "- ✅ **Commit Report**: Conventional commit validation" >> pr_body.md
          echo "- 📋 **SBOM Reports**: Software Bill of Materials for Docker images" >> pr_body.md
          echo "- 🐳 **Docker Security Report**: Container vulnerability scan results" >> pr_body.md
          echo "- 📝 **Swagger Report**: API documentation validation" >> pr_body.md
          echo "- ⎈ **Helm Packages**: Traditional Helm chart packages (.tgz files)" >> pr_body.md
          echo "- 📚 **Changelog**: Generated changelog and release guide" >> pr_body.md
          echo "" >> pr_body.md

      - name: 🔀 Create Pull Request
        uses: peter-evans/create-pull-request@4e1beaa7521e8b457b572c090b25bd3db56bf1c5 # v5.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ needs.prepare-release.outputs.branch_name }}
          base: main
          title: "NR: ${{ needs.prepare-release.outputs.release_name }}"
          body-path: pr_body.md
          commit-message: "chore: prepare release ${{ needs.prepare-release.outputs.new_version }}"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          signoff: true
          labels: |
            release
            automated
          assignees: ${{ github.actor }}
          reviewers: ${{ github.actor }}
