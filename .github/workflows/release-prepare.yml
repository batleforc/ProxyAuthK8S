name: Release Prepare

on:
  push:
    tags:
      - "v*.*.*"

# This workflow is triggered when a new tag matching the pattern "v*.*.*" is pushed.
# It will be split into multiple steps (Max dont forget to update the ci when reaching v0.4.0):
# - Build and push the Docker image to Github
#   - Back
#   - Front
#   - All In One Image (Only in V0.4.0) (contains the back and the front, do i expose the front by the back ?)
# - Build and push the Helm chart to Github
#   - CRD
#   - Chart
# - Create a draft release on github with the generated changelog by Cocogitto

env:
  REGISTRY: ghcr.io
  REPO_NAME_LOWER: ${{ format('{0}', github.event.repository.name) }}
  CHART_BASE_ARTEFACT: ${{ github.repository_owner }}/proxyauthk8s
  IMAGE_NAME_SERVER: ${{ github.repository_owner }}/proxyauthk8s/server
  IMAGE_NAME_FRONT: ${{ github.repository_owner }}/proxyauthk8s/front

permissions:
  contents: read

jobs:
  gather-facts:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      name: ${{ steps.set-name.outputs.name }}
    steps:
      - name: Set version
        id: set-version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Set name
        id: set-name
        run: |
          if [ -z "$GITHUB_HEAD_REF" ]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_HEAD_REF}" >> $GITHUB_OUTPUT
          fi
  build-and-push-back:
    name: 🐳 Build and push Back image
    permissions:
      packages: write
    needs: gather-facts
    runs-on: ubuntu-latest
    outputs:
      server_image: ${{ steps.build_server.outputs.image }}
    steps:
      - name: Build and push back image
        run: echo "Build and push back image with version ${{ needs.gather-facts.outputs.version }} and latest tag"
      - name: 🔍 Checkout release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: 🔐 Login to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build Server Image
        id: build_server
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}:${{ needs.gather-facts.outputs.version }}"
          LATEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}:latest"

          docker buildx build \
            --platform linux/amd64 \
            --tag $IMAGE_TAG \
            --tag $LATEST_TAG \
            --file deploy/build/back/Containerfile \
            --push .

          echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: 📋 Generate SBOM for Server
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.build_server.outputs.image }}
          format: cyclonedx-json
          output-file: server-sbom.json
  build-and-push-front:
    name: 🐳 Build and push front image
    permissions:
      packages: write
    needs: gather-facts
    runs-on: ubuntu-latest
    outputs:
      front_image: ${{ steps.build_front.outputs.image }}
    steps:
      - name: Build and push front image
        run: echo "Build and push front image with version ${{ needs.gather-facts.outputs.version }} and latest tag"
      - name: 🔍 Checkout release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: 🔐 Login to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build Front Image
        id: build_front
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONT }}:${{ needs.gather-facts.outputs.version }}"
          LATEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONT }}:latest"

          docker buildx build \
            --platform linux/amd64 \
            --tag $IMAGE_TAG \
            --tag $LATEST_TAG \
            --file deploy/build/front/Containerfile \
            --push .

          echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: 📋 Generate SBOM for Front
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.build_front.outputs.image }}
          format: cyclonedx-json
          output-file: front-sbom.json

  build-and-push-helm-crd:
    name: ⎈ Build and push crd helm chart
    permissions:
      packages: write
    needs: gather-facts
    runs-on: ubuntu-latest
    steps:
      - name: Build and push crd helm chart
        run: echo "Build and push crd helm chart with version ${{ needs.gather-facts.outputs.version }} and latest tag"
      - name: 🔍 Checkout release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ⎈ Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "latest"
      - name: 🔐 Login to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🔧 Install Helm plugins
        run: |
          helm plugin install https://github.com/chartmuseum/helm-push || true
      - name: ⎈ Package and push Helm Chart
        uses: bsord/helm-push@51f937208fed71540ab5ec5215cf9b3ecae9c7b7 # v4.2.0
        with:
          useOCIRegistry: true
          registry-url: oci://${{ env.REGISTRY }}/${{ env.CHART_BASE_ARTEFACT }}
          username: ${{ github.actor }}
          access-token: ${{ secrets.GITHUB_TOKEN }}
          chart-folder: deploy/chart-crd
  build-and-push-helm:
    name: ⎈ Build and push helm chart
    permissions:
      packages: write
    needs: gather-facts
    runs-on: ubuntu-latest
    steps:
      - name: Build and push helm chart
        run: echo "Build and push helm chart with version ${{ needs.gather-facts.outputs.version }} and latest tag"
      - name: 🔍 Checkout release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ⎈ Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "latest"
      - name: 🔐 Login to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🔧 Install Helm plugins
        run: |
          helm plugin install https://github.com/chartmuseum/helm-push || true
      - name: ⎈ Package and push Helm Chart
        uses: bsord/helm-push@51f937208fed71540ab5ec5215cf9b3ecae9c7b7 # v4.2.0
        with:
          useOCIRegistry: true
          registry-url: oci://${{ env.REGISTRY }}/${{ env.CHART_BASE_ARTEFACT }}
          username: ${{ github.actor }}
          access-token: ${{ secrets.GITHUB_TOKEN }}
          chart-folder: deploy/chart

  create-draft-release:
    permissions:
      contents: write # for softprops/action-gh-release to create GitHub release
    needs:
      - gather-facts
      - build-and-push-back
      - build-and-push-front
      - build-and-push-helm-crd
      - build-and-push-helm
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        run: echo "Create draft release with version ${{ needs.gather-facts.outputs.version }} and name ${{ needs.gather-facts.outputs.name }}"
      - name: 🔍 Checkout release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare release body
        run: |
          # Read the release template
          TEMPLATE=$(cat .github/release_template.md)
          RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CONTRIBUTORS=$(git log --format='%aN' | sort -u | grep -v "dependabot" | grep -v "github-actions" | grep -v "bot" | grep -v "actions" | grep -v "users.noreply.github.com" | paste -sd ", " -)

          # Replace placeholders with actual values
          TEMPLATE=${TEMPLATE//\{\{VERSION\}\}/${{ needs.gather-facts.outputs.version }}}
          TEMPLATE=${TEMPLATE//\{\{RELEASE_DATE\}\}/$RELEASE_DATE}
          TEMPLATE=${TEMPLATE//\{\{CONTRIBUTORS_LIST\}\}/$CONTRIBUTORS}

          # Save the prepared release notes to a file
          echo "$TEMPLATE" > release.md
      # Generate Release Notes and link to the existing changelog
      - name: 📝 Generate Release Notes
        id: generate_release_notes
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.gather-facts.outputs.version }}
          name: ${{ needs.gather-facts.outputs.name }}
          body_path: release.md
          draft: true
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
