name: 🌐 Frontend ESLint Analysis

# 🔍 This workflow runs ESLint static analysis on Vue.js and TypeScript files
# to ensure code quality, consistency, and catch potential issues early.
# Integrates with GitHub Security for centralized reporting.
on:
  push:
    branches: ["main"]
    paths:
      - "**/*.vue" # 🎨 Vue.js components
      - "**/*.ts" # 📘 TypeScript files
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.vue" # 🎨 Vue.js components
      - "**/*.ts" # 📘 TypeScript files
  schedule:
    - cron: "50 23 * * *" # 🕚 Daily at 23:50 UTC for security scanning
  workflow_dispatch: # 🚀 Allow manual triggering

permissions:
  contents: read

jobs:
  eslint:
    name: 🔍 Run ESLint Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read # 📖 Read repository contents
      security-events: write # 🔒 Write security analysis results
      actions: read # ⚡ Read action status (required for private repos)
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 📦 Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: "yarn" # 🚀 Speed up builds with yarn cache
          node-version: "24"

      - name: 🛠️ Install ESLint SARIF Formatter
        run: |
          yarn add @microsoft/eslint-formatter-sarif -D
        # 📋 Add SARIF formatter for GitHub Security integration

      - name: 🔍 Run ESLint Analysis
        run: npx nx run front:lint --
          --format @microsoft/eslint-formatter-sarif
          --output-file eslint-results.sarif
        continue-on-error: true
        # 🎯 Lint frontend code using NX, output in SARIF format for GitHub

      - name: 📤 Upload Results to GitHub Security
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        with:
          sarif_file: apps/front/eslint-results.sarif
          wait-for-processing: true
        # 🔒 Upload linting results to GitHub Security tab for visibility
