name: 🦀 Rust API Lint Spectral

on:
  push:
    branches: ["main", "*"]
    paths:
      - "swagger.json"
      - ".spectral.yaml"
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ["main"]
    paths:
      - "swagger.json"
      - ".spectral.yaml"
  workflow_dispatch:
  schedule:
    - cron: "50 23 * * *"

permissions:
  contents: read

jobs:
  rust-spectral-analyze:
    name: Run rust-spectral analyzing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          cache: "yarn"
      - name: Install Task
        uses: go-task/setup-task@0ab1b2a65bc55236a3bc64cde78f80e20e8885c2 # v1.0.0
      - name: Install dependencies
        run: yarn install
      - name: Install spectral lint
        run: |
          yarn add @stoplight/spectral-cli -D
      - name: Spectral lint
        run: task gen:api-lint
      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        with:
          sarif_file: spectral-report.sarif
          wait-for-processing: true
