version: "3"

tasks:
  tls:trust:
    desc: "Trust the generated TLS certificates in the local system"
    silent: true
    cmds:
      - echo "Trusting the generated TLS certificates in the local system"
      - mkcert -install
  tls:
    desc: "Generate self-signed TLS certificates for local development"
    silent: true
    cmds:
      - echo "Generating self-signed TLS certificates for local development"
      - mkdir -p .tls
      - mkcert -key-file .tls/key.pem -cert-file .tls/cert.pem 127.0.0.1 localhost
  tls-wildcard:
    desc: "Generate self-signed wildcard TLS certificates for local development"
    silent: true
    cmds:
      - echo "Generating self-signed wildcard TLS certificates for local development"
      - mkdir -p .compose/traefik/certs
      - mkcert -key-file .compose/traefik/certs/key.pem -cert-file .compose/traefik/certs/cert.pem '*.k8s.localhost' k8s.localhost
  crds:
    desc: "Generate Custom Resource Definitions"
    silent: true
    cmds:
      - cargo run --bin crdgen
  swagger:
    desc: "Generate Swagger documentation"
    silent: true
    cmds:
      - cargo run --bin swaggergen
  crds-file:
    desc: "Generate Custom Resource Definitions and save to file"
    silent: true
    cmds:
      - task gen:crds > deploy/crds.yaml
      - cp deploy/crds.yaml deploy/chart-crd/templates/crds.yaml
      - sed -i -e 's/{{ "{{" }}/\\{\\{/g' -e 's/{{ "}}" }}/\\}\\}/g' deploy/chart-crd/templates/crds.yaml
  swagger-file:
    desc: "Generate Swagger documentation and save to file"
    silent: true
    cmds:
      - task gen:swagger > swagger.json
      - cp swagger.json .docs/swagger.json
  client:
    desc: "Generate Node and Rust API Clients from OpenAPI specification"
    silent: true
    deps:
      - api-client
      - back-api-client
  back-api-client:
    desc: "Generate backend API client from OpenAPI specification"
    silent: true
    vars:
      RUST_VERSION:
        sh: cat apps/server/Cargo.toml | grep 'version' | head -1 | cut -d '"' -f2
    cmds:
      - echo "Generating backend API client from OpenAPI specification"
      - npx @openapitools/openapi-generator-cli generate -i ./swagger.json -g rust -o./libs/cli/client_api
      - cargo clippy --fix --lib -p client_api --allow-dirty
      - cargo fmt --all
  api-client:
    desc: "Generate API client from OpenAPI specification"
    silent: true
    vars:
      RUST_VERSION:
        sh: cat apps/server/Cargo.toml | grep 'version' | head -1 | cut -d '"' -f2
    cmds:
      - echo "Generating API client from OpenAPI specification"
      - yarn openapi-ts
  api-lint:
    desc: "Lint the OpenAPI specification with Spectral"
    silent: true
    cmds:
      - echo "Linting the OpenAPI specification with Spectral"
      - yarn spectral lint -f sarif -o ./spectral-report.sarif ./swagger.json
  docs:crd:
    desc: "Generate documentation for Custom Resource Definitions"
    silent: true
    cmds:
      - echo "Generating documentation for Custom Resource Definitions"
      - podman run -u $(id -u):$(id -g) --rm -v ${PWD}:/workdir ghcr.io/fybrik/crdoc:latest --resources /workdir/deploy/crds.yaml --output /workdir/.docs/content/docs/crds.mdx
      - echo "Replacing all curly braces with escaped version in the generated documentation"
      - sed -i -e 's/{{ "{{" }}/\\{\\{/g' -e 's/{{ "}}" }}/\\}\\}/g' .docs/content/docs/crds.mdx
      - echo "Add front matter to the generated documentation"
      - .docs/scripts/add-frontmatter.sh --title "Custom Resource Definitions" --icon DraftingCompass --output .docs/content/docs/crds.mdx .docs/content/docs/crds.mdx
